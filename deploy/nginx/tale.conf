# ---------------------------------------------------------------------------
# Talé Hotel — Nginx site config (single VPS, single domain)
#
# Install:
#   sudo cp deploy/nginx/tale.conf /etc/nginx/sites-available/tale.conf
#   sudo ln -s /etc/nginx/sites-available/tale.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue certificates:
#   sudo certbot --nginx -d talehotel.com -d www.talehotel.com
#
# Certbot will rewrite this file to add the listen-443 block + redirects.
# ---------------------------------------------------------------------------

# Redirect www → apex + HTTPS (certbot will manage the TLS half).
server {
    listen 80;
    listen [::]:80;
    server_name talehotel.com www.talehotel.com;

    # ACME challenge (certbot) goes here before TLS is set up.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: certbot converts this to a 301 to https:// after
    # running `certbot --nginx`. Leave this block for the initial issuance.
    location / {
        return 200 'Talé Hotel — provisioning in progress\n';
        add_header Content-Type text/plain;
    }
}

# Main site. Certbot adds a matching listen 443 ssl block automatically;
# the upstream proxy rules below are preserved on reload.
server {
    listen 80;
    listen [::]:80;
    server_name talehotel.com www.talehotel.com;

    # ---- Security + client limits ---------------------------------------
    client_max_body_size 20m;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 30s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # ---- Gzip -----------------------------------------------------------
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ---- /api → Express backend ----------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- /healthz → Express (for uptime monitors) ----------------------
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:5000/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Long-cache the Next.js immutable build output ------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Everything else → Next.js -------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
